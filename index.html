<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="logo-icon ri-stack-fill"></i>
                <div class="logo-text">
                    <h2>FinTrack Pro</h2>
                    <p>Enterprise Finance</p>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" id="nav-dashboard"><i class="ri-dashboard-fill"></i>
                    Dashboard</a>
                <a href="#" class="nav-item" id="nav-settings"><i class="ri-settings-3-fill"></i> Settings</a>
            </nav>

            <button class="add-transaction-btn" id="add-transaction-btn">
                <i class="ri-add-fill"></i> Add Transaction
            </button>
        </aside>

        <main class="main">
            <header class="navbar">
                <div class="navbar-actions">
                    <div class="nav-right">

                        <div class="user-info">
                            <span class="user-name">shiny</span>
                        </div>

                        <button id="logout-btn">
                            <i class="ri-logout-box-r-line"></i> Logout
                        </button>
                    </div>
                </div>
            </header>
            <section id="view-dashboard" class="dashboard view-section active">

                <div class="view-header">
                    <h1>Financial Overview</h1>
                    <p>Real-time tracking application</p>
                </div>

                <div class="view-stat-cards">
                    <div class="card">
                        <div class="card-icon bg-blue"><i class="ri-bank-fill"></i></div>
                        <p>Current Balance</p>
                        <h3 id="stat-balance">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-green"><i class="ri-arrow-right-up-line"></i></div>
                        <p>Total Income</p>
                        <h3 id="stat-income" class="text-green">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-red"><i class="ri-arrow-right-down-line"></i></div>
                        <p>Total Expense</p>
                        <h3 id="stat-expense" class="text-red">$0.00</h3>
                    </div>
                    <div class="card">
                        <div class="card-icon bg-blue"><i class="ri-wallet-3-line"></i></div>
                        <p>Total Transactions</p>
                        <h3 id="stat-count">0</h3>
                    </div>
                </div>

                
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>
